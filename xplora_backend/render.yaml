services:
  - type: web
    name: xplora-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_KEY_2
        sync: false
      - key: GROQ_API_KEY_3
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY_2
        sync: false
      - key: OPENROUTER_API_KEY_3
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: MISTRAL_API_KEY_2
        sync: false
      - key: MISTRAL_API_KEY_3
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: TOGETHER_API_KEY_2
        sync: false
      - key: TOGETHER_API_KEY_3
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY_2
        sync: false
      - key: OPENWEATHER_API_KEY_3
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: RAPIDAPI_KEY_2
        sync: false
      - key: RAPIDAPI_KEY_3
        sync: false
      - key: UNSPLASH_ACCESS_KEY
        sync: false
      - key: UNSPLASH_ACCESS_KEY_2
        sync: false
      - key: UNSPLASH_ACCESS_KEY_3
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
